version: v2beta1

vars:
  TELEGRAM_CONNECTOR_NAMESPACE: platform
  E2E_IMAGE: ghcr.io/agynio/devcontainer-go:1

functions:
  disable_argocd_sync: |-
    if kubectl get application telegram-connector -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for telegram-connector..."
      kubectl patch application telegram-connector -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'telegram-connector' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application telegram-connector -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for telegram-connector..."
      kubectl patch application telegram-connector -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'telegram-connector' not found in argocd namespace."
    fi
  patch_deployment: |-
    echo "Patching telegram-connector deployment for DevSpace..."
    kubectl patch deployment telegram-connector-telegram-connector -n ${TELEGRAM_CONNECTOR_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: telegram-connector
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with E2E_IMAGE
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api \
                    --path agynio/api/apps/v1/apps.proto \
                    --path agynio/api/files/v1/files.proto \
                    --path agynio/api/threads/v1/threads.proto \
                    --path agynio/api/notifications/v1/notifications.proto \
                    --path agynio/api/gateway/v1/apps.proto \
                    --path agynio/api/gateway/v1/files.proto \
                    --path agynio/api/gateway/v1/threads.proto \
                    --path agynio/api/gateway/v1/notifications.proto
                  exec go run ./cmd/telegram-connector
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"

deployments:
  telegram-connector-db:
    namespace: ${TELEGRAM_CONNECTOR_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - image: postgres:16-alpine
            env:
              - name: POSTGRES_DB
                value: telegram_connector
              - name: POSTGRES_USER
                value: telegram
              - name: POSTGRES_PASSWORD
                value: telegram
            ports:
              - name: postgres
                containerPort: 5432
        service:
          ports:
            - name: postgres
              port: 5432
              targetPort: 5432
  telegram-connector:
    namespace: ${TELEGRAM_CONNECTOR_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - name: telegram-connector
            image: ${E2E_IMAGE}
            workingDir: /opt/app/data
            command:
              - bash
              - -c
              - |
                set -eu
                elapsed=0
                while [ ! -f /opt/app/data/go.mod ]; do
                  sleep 1; elapsed=$((elapsed + 1))
                  [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                done
                if [ ! -f /opt/app/data/.gen/go/agynio/api/apps/v1/apps.pb.go ]; then
                  elapsed=0
                  while [ ! -f /opt/app/data/.gen/go/agynio/api/apps/v1/apps.pb.go ] && [ "$elapsed" -lt 30 ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                  done
                fi
                if [ ! -f /opt/app/data/.gen/go/agynio/api/apps/v1/apps.pb.go ]; then
                  buf generate buf.build/agynio/api \
                    --path agynio/api/apps/v1/apps.proto \
                    --path agynio/api/files/v1/files.proto \
                    --path agynio/api/threads/v1/threads.proto \
                    --path agynio/api/notifications/v1/notifications.proto \
                    --path agynio/api/gateway/v1/apps.proto \
                    --path agynio/api/gateway/v1/files.proto \
                    --path agynio/api/gateway/v1/threads.proto \
                    --path agynio/api/gateway/v1/notifications.proto
                fi
                elapsed=0
                until (echo > /dev/tcp/telegram-connector-db/5432) >/dev/null 2>&1; do
                  sleep 2; elapsed=$((elapsed + 2))
                  [ "$elapsed" -ge 120 ] && { echo "ERROR: postgres not ready" >&2; exit 1; }
                done
                exec go run ./cmd/telegram-connector
            env:
              - name: HTTP_ADDRESS
                value: ":8080"
              - name: DATABASE_URL
                value: "postgres://telegram:telegram@telegram-connector-db:5432/telegram_connector?sslmode=disable"
              - name: ZITI_IDENTITY_FILE
                value: "/ziti/identity.json"
              - name: SERVICE_TOKEN
                value: ""
              - name: GATEWAY_URL
                value: "http://gateway-gateway:8080"
              - name: ZITI_SERVICE_NAME
                value: "app-telegram-e2e"
              - name: GATEWAY_SERVICE_NAME
                value: "gateway"
              - name: APP_ID
                value: ""
              - name: TELEGRAM_BASE_URL
                value: "http://telegram-mock:8443"
              - name: TELEGRAM_POLL_TIMEOUT
                value: "30s"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            ports:
              - name: http
                containerPort: 8080
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
              - containerPath: /ziti
                volume:
                  name: ziti
        volumes:
          - name: data
            emptyDir: {}
          - name: ziti
            emptyDir: {}
        service:
          ports:
            - name: http
              port: 8080
              targetPort: 8080
  telegram-mock:
    namespace: ${TELEGRAM_CONNECTOR_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - name: telegram-mock
            image: ${E2E_IMAGE}
            workingDir: /opt/app/data
            command:
              - sh
              - -c
              - |
                set -eu
                elapsed=0
                while [ ! -f /opt/app/data/go.mod ]; do
                  sleep 1; elapsed=$((elapsed + 1))
                  [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                done
                exec go run ./test/e2e/telegram-mock
            env:
              - name: TELEGRAM_MOCK_ADDRESS
                value: ":8443"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            ports:
              - name: http
                containerPort: 8443
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
        volumes:
          - name: data
            emptyDir: {}
        service:
          ports:
            - name: http
              port: 8443
              targetPort: 8443
  e2e-runner:
    namespace: ${TELEGRAM_CONNECTOR_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - name: e2e-runner
            image: ${E2E_IMAGE}
            command: ["sleep", "infinity"]
            env:
              - name: TELEGRAM_CONNECTOR_ADDRESS
                value: "telegram-connector:8080"
              - name: TELEGRAM_MOCK_ADDRESS
                value: "telegram-mock:8443"
              - name: APPS_ADDRESS
                value: "apps:50051"
              - name: THREADS_ADDRESS
                value: "threads:50051"
              - name: FILES_ADDRESS
                value: "files:50051"
              - name: NOTIFICATIONS_ADDRESS
                value: "notifications:50051"
              - name: ORGANIZATIONS_ADDRESS
                value: "tenants:50051"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
        volumes:
          - name: data
            emptyDir: {}

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace telegram-connector
      else
        start_dev --disable-pod-replace telegram-connector
        echo "Waiting for telegram-connector to be healthy on :8080..."
        healthy=false
        for i in $(seq 1 60); do
          if exec_container --label-selector=app.kubernetes.io/component=telegram-connector -n ${TELEGRAM_CONNECTOR_NAMESPACE} -- bash -c 'nc -z localhost 8080 >/dev/null 2>&1 || (echo > /dev/tcp/localhost/8080) >/dev/null 2>&1'; then
            healthy=true
            break
          fi
          sleep 2
        done
        if [ "$healthy" != "true" ]; then
          echo "ERROR: telegram-connector did not become healthy within 120s" >&2
          exit 1
        fi
        echo "Dev environment ready. Stopping dev session."
        stop_dev telegram-connector
      fi

  test-e2e:
    run: |-
      create_deployments telegram-connector-db telegram-mock e2e-runner
      start_dev --disable-pod-replace telegram-mock &
      start_dev --disable-pod-replace e2e-runner &
      sleep 5
      BOOTSTRAP_ENV=$(exec_container \
        --label-selector "app.kubernetes.io/component=e2e-runner" \
        -n ${TELEGRAM_CONNECTOR_NAMESPACE} \
        -- bash -c 'set -eu; elapsed=0; while [ ! -f /opt/app/data/go.mod ]; do sleep 1; elapsed=$((elapsed + 1)); [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }; done; cd /opt/app/data && go run -tags e2e ./test/e2e/bootstrapcmd')
      eval "$BOOTSTRAP_ENV"
      create_deployments telegram-connector
      kubectl set env deployment telegram-connector -n ${TELEGRAM_CONNECTOR_NAMESPACE} \
        APP_ID="$E2E_APP_ID" \
        SERVICE_TOKEN="$E2E_SERVICE_TOKEN" \
        ZITI_SERVICE_NAME="$E2E_ZITI_SERVICE_NAME" \
        TELEGRAM_BASE_URL="http://telegram-mock:8443"
      kubectl rollout status deployment telegram-connector -n ${TELEGRAM_CONNECTOR_NAMESPACE} --timeout=120s
      start_dev --disable-pod-replace telegram-connector &
      exec_container \
        --label-selector "app.kubernetes.io/component=e2e-runner" \
        -n ${TELEGRAM_CONNECTOR_NAMESPACE} \
        -- bash -c "set -eu; elapsed=0; while [ ! -f /opt/app/data/go.mod ]; do sleep 1; elapsed=$((elapsed + 1)); [ \"$elapsed\" -ge 120 ] && { echo \"ERROR: sync timeout\" >&2; exit 1; }; done; cd /opt/app/data && E2E_OWNER_IDENTITY_ID=$E2E_OWNER_IDENTITY_ID E2E_AGENT_IDENTITY_ID=$E2E_AGENT_IDENTITY_ID E2E_ORGANIZATION_ID=$E2E_ORGANIZATION_ID E2E_APP_ID=$E2E_APP_ID E2E_APP_IDENTITY_ID=$E2E_APP_IDENTITY_ID E2E_CLEANUP=$E2E_CLEANUP go test -v -count=1 -tags e2e ./test/e2e/"
      EXIT_CODE=$?
      stop_dev telegram-connector
      stop_dev telegram-mock
      stop_dev e2e-runner
      purge_deployments telegram-connector
      purge_deployments telegram-connector-db
      purge_deployments telegram-mock
      purge_deployments e2e-runner
      exit $EXIT_CODE

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:telegram-connector
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  telegram-connector:
    namespace: ${TELEGRAM_CONNECTOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/component: telegram-connector
    containers:
      telegram-connector:
        container: telegram-connector
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /codex-tools-mcp
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /codex-tools-mcp
              - /tmp/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "8080"

  telegram-mock:
    namespace: ${TELEGRAM_CONNECTOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/component: telegram-mock
    command:
      - sh
      - -c
      - |
        set -eu
        elapsed=0
        while [ ! -f /opt/app/data/go.mod ]; do
          sleep 1; elapsed=$((elapsed + 1))
          [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
        done
        exec go run ./test/e2e/telegram-mock
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - /codex-tools-mcp
          - /tmp/

  e2e-runner:
    namespace: ${TELEGRAM_CONNECTOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/component: e2e-runner
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - /codex-tools-mcp
          - /tmp/
